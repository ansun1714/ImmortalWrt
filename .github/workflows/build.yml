name: Build ImmortalWrt · WH3000 Pro

on:
  push:
    branches: [ main ]
    paths:
      - 'wh3000pro.config'
      - 'scripts/**'
      - 'files/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      clean_build:
        description: '强制全量编译（清除 ccache）'
        type: boolean
        default: false

env:
  # ── 源码选择（二选一，默认用官方 ImmortalWrt openwrt-24.10）──────
  # 选项 A：官方 ImmortalWrt（WH3000 Pro 从 24.10.x 起原生支持）
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10

  # 选项 B：immortalwrt-mt798x（MediaTek 闭源驱动，WiFi 稳定性更好）
  # 若要换此源，注释掉上面两行，取消注释下面两行，同时将 config 中
  # CONFIG_PACKAGE_wpad-openssl-mbedtls 改为 CONFIG_PACKAGE_kmod-mt76=y
  # REPO_URL: https://github.com/immortalwrt-mt798x/immortalwrt
  # REPO_BRANCH: openwrt-24.10

  CONFIG_FILE: wh3000pro.config
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      # ── 磁盘扩容 ──────────────────────────────────────────────────
      - name: 释放磁盘空间 + 挂载 Swap
        run: |
          echo "▶ 释放前可用空间："
          df -hT
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get autoremove -y --purge
          sudo apt-get clean

          # 10 GB swap — Docker + OpenClash 编译很耗内存
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "▶ 释放后可用空间："
          df -hT

      # ── 依赖安装 ──────────────────────────────────────────────────
      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar file flex g++ gawk gcc-multilib g++-multilib gettext \
            git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 \
            libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
            libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool \
            lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-pyelftools \
            qemu-utils re2c rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev
          pip3 install pyelftools --quiet

      # ── 克隆源码（shallow 加速）────────────────────────────────────
      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone -b $REPO_BRANCH --single-branch --filter=blob:none \
            $REPO_URL immortalwrt
          echo "REPO_PATH=$GITHUB_WORKSPACE/immortalwrt" >> $GITHUB_ENV

      # ── ccache 缓存恢复 ────────────────────────────────────────────
      - name: 恢复 ccache 缓存
        if: ${{ !inputs.clean_build }}
        uses: actions/cache@v4
        with:
          path: |
            immortalwrt/.ccache
            immortalwrt/staging_dir/host
            immortalwrt/staging_dir/hostpkg
          key: imwrt-wh3000pro-${{ runner.os }}-${{ hashFiles('wh3000pro.config') }}-${{ github.sha }}
          restore-keys: |
            imwrt-wh3000pro-${{ runner.os }}-${{ hashFiles('wh3000pro.config') }}-
            imwrt-wh3000pro-${{ runner.os }}-

      # ── DIY Part 1：feeds 阶段 ─────────────────────────────────────
      - name: 执行 diy-part1.sh
        working-directory: immortalwrt
        run: |
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装 feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ── 配置阶段 ──────────────────────────────────────────────────
      - name: 复制 .config
        run: cp $CONFIG_FILE immortalwrt/.config

      - name: 执行 diy-part2.sh
        working-directory: immortalwrt
        run: |
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 注入 files 目录
        run: |
          if [ -d "files" ] && [ "$(ls -A files)" ]; then
            cp -rv files/. immortalwrt/files/
          fi

      - name: make defconfig
        working-directory: immortalwrt
        run: make defconfig

      # ── 下载软件包 ────────────────────────────────────────────────
      - name: 下载依赖包
        working-directory: immortalwrt
        run: |
          make download -j$(nproc) V=s 2>&1 | grep -E "^(ERROR|WARNING)" || true
          find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true

      # ── 编译 ──────────────────────────────────────────────────────
      - name: 多核编译
        id: compile
        working-directory: immortalwrt
        continue-on-error: true
        run: |
          echo "▶ 核心数：$(nproc)"
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 单核降级编译（回退）
        if: steps.compile.outputs.status != 'success'
        working-directory: immortalwrt
        run: |
          echo "▶ 多核编译失败，切换单核详细输出..."
          make -j1 V=s 2>&1 | tee /tmp/build_j1.log
          cp /tmp/build_j1.log $GITHUB_WORKSPACE/build_error.log

      # ── 收集固件 ──────────────────────────────────────────────────
      - name: 收集固件
        id: collect
        run: |
          mkdir -p firmware
          FIRM_DIR=immortalwrt/bin/targets/mediatek/filogic
          find "$FIRM_DIR" -type f \
            \( -name "*wh3000-pro*sysupgrade*" -o -name "*wh3000-pro*factory*" \) \
            ! -name "*.json" ! -name "*.buildinfo" \
            -exec cp -v {} firmware/ \;
          # 同时保存最终 .config 方便复现
          cp immortalwrt/.config firmware/wh3000pro_full.config
          echo "▶ 固件列表：" && ls -lh firmware/
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传 Artifact（7天保留）
        if: ${{ env.UPLOAD_FIRMWARE == 'true' && steps.collect.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: firmware-wh3000pro-${{ github.run_number }}
          path: firmware/
          retention-days: 7

      # ── Release 发布 ──────────────────────────────────────────────
      - name: 生成 Release 标签
        id: tag
        if: ${{ env.UPLOAD_RELEASE == 'true' && steps.collect.outputs.status == 'success' }}
        run: |
          TAG="wh3000pro-$(date +%Y%m%d-%H%M)"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          cat > release_notes.md << EOF
          ## WH3000 Pro · ImmortalWrt 固件

          - 📅 编译时间：$(date '+%Y-%m-%d %H:%M:%S CST')
          - 🌿 源码：immortalwrt/immortalwrt \`openwrt-24.10\`
          - 📦 目标：MT7981 Filogic / huasifei_wh3000-pro
          - 🔧 内核：Linux 6.6（LTS）

          ### 内置功能
          - 代理：SSR-Plus + OpenClash
          - 容器：Docker + Compose + dockerman
          - 4G/5G：QModem + quectel-CM-5G-M
          - IPTV：msd_lite + rtp2httpd + unicast-proxy + iptv-manager
          - VPN：OpenVPN Server
          - 共享：Samba + USB 存储（ext4/exfat/ntfs3）
          - 网络：TurboACC · BBR · FullconeNAT · 硬件卸载
          - 工具：Lucky · UPnP · WOL · vlmcsd

          ### 刷机
          - \`*-sysupgrade.bin\` → LuCI 升级或 SSH \`sysupgrade -n\`
          - \`*-factory.bin\` → U-Boot Web（WAN 口接电脑，开机按 Reset 5 秒）
          EOF

      - name: 发布 GitHub Release
        if: ${{ env.UPLOAD_RELEASE == 'true' && steps.collect.outputs.status == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ${{ steps.tag.outputs.release_tag }}
          body_path: release_notes.md
          files: firmware/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 Release（保留最近 5 个）
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

