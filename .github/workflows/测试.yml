name: Build ImmortalWrt · WH3000 Series

on:
  push:
    branches: [ main ]
    paths:
      - '*.config'
      - 'scripts/**'
      - 'files/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      device:
        description: '选择编译设备'
        type: choice
        options:
          - wh3000pro
          - wh3000
          - all
        default: wh3000pro
      clean_build:
        description: '强制全量编译（清除 ccache）'
        type: boolean
        default: false

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  DIY_P1_SH: scripts/diy-part1.sh
  DIY_P2_SH: scripts/diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: 生成编译矩阵
        id: set-matrix
        run: |
          DEVICE="${{ github.event.inputs.device || 'wh3000pro' }}"
          if [ "$DEVICE" = "all" ]; then
            echo 'matrix={"device":["wh3000pro","wh3000"]}' >> $GITHUB_OUTPUT
          else
            echo "matrix={\"device\":[\"$DEVICE\"]}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间 + 挂载 Swap
        run: |
          echo "▶ 释放前可用空间："
          df -hT
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get autoremove -y --purge || true
          sudo apt-get clean
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "▶ 释放后可用空间："
          df -hT

      - name: 安装编译依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler \
            ecj fastjar file flex g++ gawk gcc-multilib g++-multilib gettext \
            git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 \
            libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool \
            lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-pyelftools \
            qemu-utils re2c rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev
          pip3 install pyelftools --quiet

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone -b $REPO_BRANCH --single-branch --filter=blob:none \
            $REPO_URL immortalwrt

      - name: 恢复 ccache 缓存
        if: ${{ !inputs.clean_build }}
        uses: actions/cache@v4
        with:
          path: |
            immortalwrt/.ccache
            immortalwrt/staging_dir/host
            immortalwrt/staging_dir/hostpkg
          key: imwrt-${{ matrix.device }}-${{ runner.os }}-${{ hashFiles(format('{0}.config', matrix.device)) }}-${{ github.sha }}
          restore-keys: |
            imwrt-${{ matrix.device }}-${{ runner.os }}-${{ hashFiles(format('{0}.config', matrix.device)) }}-
            imwrt-${{ matrix.device }}-${{ runner.os }}-

      - name: 执行 diy-part1.sh
        working-directory: immortalwrt
        run: |
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装 feeds
        working-directory: immortalwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 复制 .config
        run: cp ${{ matrix.device }}.config immortalwrt/.config

      - name: 执行 diy-part2.sh
        working-directory: immortalwrt
        run: |
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 注入 files 目录
        run: |
          if [ -d "files" ] && [ "$(ls -A files)" ]; then
            cp -rv files/. immortalwrt/files/
          fi

      - name: make defconfig
        working-directory: immortalwrt
        run: make defconfig

      # defconfig 之后内核版本已确定，直接从源码读取完整版本号
      - name: 获取内核版本
        id: kernel
        working-directory: immortalwrt
        run: |
          # 读取 target 目录下的内核版本文件，格式如 6.6.87
          KVER=$(cat include/kernel-version.mk 2>/dev/null \
            | grep -E "^LINUX_VERSION-[0-9]" \
            | head -1 \
            | sed 's/.*:=[ ]*//' \
            | tr -d ' ')
          # 兜底：从 Makefile 读
          if [ -z "$KVER" ]; then
            KVER=$(grep -r "LINUX_VERSION:=" target/linux/mediatek/ 2>/dev/null \
              | head -1 | sed 's/.*:=[ ]*//' | tr -d ' ')
          fi
          # 再兜底：make kernelversion（最准但慢）
          if [ -z "$KVER" ]; then
            KVER=$(make --no-print-directory kernelversion 2>/dev/null || echo "6.6")
          fi
          echo "▶ 内核版本：$KVER"
          echo "version=$KVER" >> $GITHUB_OUTPUT

      - name: 下载依赖包
        working-directory: immortalwrt
        run: |
          make download -j$(nproc) V=s 2>&1 | grep -E "^(ERROR|WARNING)" || true
          find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true

      - name: 多核编译
        id: compile
        working-directory: immortalwrt
        continue-on-error: true
        run: |
          set -o pipefail
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log
          [ $? -eq 0 ] && echo "status=success" >> $GITHUB_OUTPUT

      - name: 单核降级编译（回退）
        if: steps.compile.outputs.status != 'success'
        id: compile_fallback
        working-directory: immortalwrt
        continue-on-error: true
        run: |
          make -j1 V=s 2>&1 | tee /tmp/build_j1.log
          [ $? -eq 0 ] && echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传错误日志
        if: steps.compile.outputs.status != 'success' && steps.compile_fallback.outputs.status != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log-${{ matrix.device }}-${{ github.run_number }}
          path: /tmp/build_j1.log
          retention-days: 3

      - name: 收集固件
        id: collect
        if: steps.compile.outputs.status == 'success' || steps.compile_fallback.outputs.status == 'success'
        run: |
          mkdir -p firmware
          FIRM_DIR=immortalwrt/bin/targets/mediatek/filogic
          find "$FIRM_DIR" -type f \
            \( -name "*wh3000*sysupgrade*" -o -name "*wh3000*factory*" \) \
            ! -name "*.json" ! -name "*.buildinfo" \
            -exec cp -v {} firmware/ \;
          cp immortalwrt/.config firmware/${{ matrix.device }}_full.config
          echo "▶ 固件列表：" && ls -lh firmware/
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传 Artifact（7天保留）
        if: env.UPLOAD_FIRMWARE == 'true' && steps.collect.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device }}-${{ github.run_number }}
          path: firmware/
          retention-days: 7

      - name: 生成 Release 标签
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && steps.collect.outputs.status == 'success'
        run: |
          # 命名规则：设备名-内核版本-日期时间
          # 例：wh3000pro-6.6.87-20260624-1033
          TAG="${{ matrix.device }}-${{ steps.kernel.outputs.version }}-$(date +%Y%m%d-%H%M)"
          echo "release_tag=$TAG" >> $GITHUB_OUTPUT
          cat > release_notes.md << EOF
          ## ${{ matrix.device }} · ImmortalWrt 固件

          - 📅 编译时间：$(date '+%Y-%m-%d %H:%M:%S CST')
          - 🌿 源码：immortalwrt/immortalwrt \`openwrt-24.10\`
          - 📦 目标：MT7981 Filogic / huasifei_${{ matrix.device }}
          - 🔧 内核：Linux ${{ steps.kernel.outputs.version }}

          ### 内置功能
          - 代理：SSR-Plus + OpenClash
          - 容器：Docker + Compose + dockerman
          - 4G/5G：QModem + quectel-CM-5G-M
          - IPTV：msd_lite + rtp2httpd + unicast-proxy + iptv-manager
          - VPN：OpenVPN Server
          - 共享：Samba4 + USB 存储（ext4/exfat/ntfs3）
          - 网络：TurboACC · BBR · FullconeNAT · 硬件卸载
          - 工具：Lucky · UPnP · WOL · vlmcsd

          ### 刷机
          - \`*-sysupgrade.bin\` → LuCI 升级或 SSH \`sysupgrade -n\`
          - \`*-factory.bin\` → U-Boot Web（WAN 口接电脑，开机按 Reset 5 秒）
          EOF

      - name: 发布 GitHub Release
        if: env.UPLOAD_RELEASE == 'true' && steps.collect.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ${{ steps.tag.outputs.release_tag }}
          body_path: release_notes.md
          files: firmware/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 Release（保留最近 5 个）
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          repo: ${{ github.repository }}
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
